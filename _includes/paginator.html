{% if paginator.previous_page %}
<a href="{{ paginator.previous_page_path }}" class="text-green-400 hover:text-green-500"><i class="fas fa-arrow-left"></i></a>
{% else %}
<span class="text-gray-500"><i class="fas fa-arrow-left"></i></span>
{% endif %}
<span class="text-gray-500">Pagina: {{ paginator.page }} de {{ paginator.total_pages }}</span>
{% if paginator.next_page %}
<a href="{{ paginator.next_page_path }}" class="text-green-400 hover:text-green-500"><i class="fas fa-arrow-right"></i></a>
{% else %}
<span class="text-gray-500"><i class="fas fa-arrow-right"></i></span>
{% endif %}
