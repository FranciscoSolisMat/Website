---
layout: default
title: Autores
---

<div class="md:grid md:grid-cols-2">
    {% for author in site.autores %}
    <div class="flex flex-row items-center mb-10 mr-10 cursor-pointer" onclick="window.location = '{{ author.url }}'">
        <img class="mr-5 rounded-full" src="https://gravatar.com/avatar/{{ author.gravatar | downcase | md5 }}?s=80" alt="">
        <div class="flex-col">
            <h3>{{ author.name }} ({{ author.username }})</h3>
            <span class="text-gray-500">{{ author.content | markdownify }}</span>
        </div>
    </div>
    {% endfor %}
</div>
