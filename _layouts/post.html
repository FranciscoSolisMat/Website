---
layout: default
---

<div class="border border-gray-700 bg-white rounded-md shadow-2xl">
    <div class="p-5">
        <h1 class="text-green-400">{{ page.title }}</h1>
        <div style="min-height: 20vh" class="my-4">
            {{ content | markdownify }}
        </div>
        {% assign author = site.autores | where: 'username', page.author | first %}
        <span class="text-gray-500">Posteado por <a href="{{ author.url }}" class="text-green-400 hover:text-green-500">{{ author.name }}</a> el {{ page.date | date_to_string }}</span>
    </div>
</div>
